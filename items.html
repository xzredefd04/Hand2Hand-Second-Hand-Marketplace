<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESSENTIALS | HANDS2HANDS</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&family=Inter:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --border-color: #eeeeee; --secondary-text: #757575; --transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Kanit', sans-serif; background: white; }
        header { padding: 30px; text-align: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; background: white; z-index: 100; }
        .logo { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 600; letter-spacing: 6px; text-decoration: none; color: black; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        
        .category-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .category-item { font-size: 13px; color: var(--secondary-text); cursor: pointer; text-decoration: none; }
        .category-item.active { color: black; border-bottom: 1px solid black; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 30px; }
        .product-card { cursor: pointer; text-decoration: none; color: inherit; }
        .image-container { width: 100%; aspect-ratio: 4 / 5; border: 1px solid var(--border-color); overflow: hidden; position: relative; background: #fcfcfc; }
        .image-track { display: flex; width: 100%; height: 100%; transition: transform var(--transition); }
        .slide-img { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #fdfdfd; color: #ccc; font-size: 12px; text-transform: uppercase; }
        .product-info { padding: 15px 0; }
        .product-name { display: block; font-size: 14px; margin-bottom: 5px; }
        .product-price { font-size: 14px; color: var(--secondary-text); }
        
        @media (max-width: 600px) { .product-grid { grid-template-columns: 1fr 1fr; gap: 15px; } }
    </style>
</head>
<body>
    <header><a href="home.html" class="logo">HANDS2HANDS</a></header>
    <div class="container">
        <nav class="category-bar">
            <a href="home.html" class="category-item">ทั้งหมด</a>
            <span class="category-item">เสื้อผ้า</span>
            <span class="category-item">หนังสือ</span>
            <span class="category-item active">ของใช้</span>
            <span class="category-item">ของสะสม</span>
        </nav>
        <div class="product-grid" id="list"></div>
    </div>

    <script>
        // เปลี่ยนชุดข้อมูลเป็นหมวดของใช้ทั้งหมด
        const products = [
            { n: "โคมไฟตั้งโต๊ะ ปรับแสงได้ 3 ระดับ", p: "490.00" },
            { n: "พัดลมพกพา ชาร์จ USB", p: "190.00" },
            { n: "พาวเวอร์แบงค์ 20,000 mAh", p: "550.00" },
            { n: "กระติกน้ำเก็บอุณหภูมิ สแตนเลส", p: "320.00" },
            { n: "ชั้นวางของอเนกประสงค์ 3 ชั้น", p: "290.00" },
            { n: "เครื่องคิดเลขวิทยาศาสตร์", p: "850.00" },
            { n: "ร่มพับกัน UV ลายมินิมอล", p: "150.00" },
            { n: "เบาะรองนั่งเพื่อสุขภาพ", p: "420.00" },
            { n: "กาน้ำร้อนไฟฟ้าขนาดพกพา", p: "390.00" },
            { n: "ปลั๊กพ่วงมาตรฐาน มอก. 5 ช่อง", p: "250.00" },
            { n: "กล่องข้าวเก็บความร้อน (Bento Box)", p: "180.00" },
            { n: "ลำโพงบลูทูธจิ๋ว เสียงเบสหนัก", p: "350.00" }
        ];

        const list = document.getElementById('list');
        
        products.forEach(p => {
            list.innerHTML += `
                <a href="sucessdetail.html" class="product-card" onmouseenter="startSlide(this)" onmouseleave="stopSlide(this)">
                    <div class="image-container">
                        <div class="image-track">
                            <div class="slide-img">ITEM FRONT</div>
                            <div class="slide-img">ITEM DETAIL</div>
                        </div>
                    </div>
                    <div class="product-info">
                        <span class="product-name">${p.n}</span>
                        <span class="product-price">฿ ${p.p}</span>
                    </div>
                </a>`;
        });

        let slideIntervals = new Map();
        function startSlide(card) {
            const track = card.querySelector('.image-track');
            let curr = 0;
            const interval = setInterval(() => { 
                curr = (curr === 0) ? 1 : 0; 
                track.style.transform = `translateX(-${curr * 100}%)`; 
            }, 1200);
            slideIntervals.set(card, interval);
        }
        function stopSlide(card) { 
            clearInterval(slideIntervals.get(card)); 
            card.querySelector('.image-track').style.transform = 'translateX(0)'; 
        }
    </script>
</body>
</html>
