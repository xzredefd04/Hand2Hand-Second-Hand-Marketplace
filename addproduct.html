<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงขายสินค้า | HANDS2HANDS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --secondary-text: #757575;
            --border-color: #eeeeee;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            font-family: 'Kanit', 'Inter', sans-serif; /* ใช้ Kanit เป็นหลัก */
            margin: 0;
            color: var(--text-color);
            letter-spacing: 0.5px;
        }

        /* --- HEADER --- */
        header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 8px;
            text-decoration: none;
            color: black;
            text-transform: uppercase;
        }

        /* --- LAYOUT --- */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 20px;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 80px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--secondary-text);
            margin-bottom: 30px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* --- LEFT SIDE: IMAGE UPLOAD --- */
        .upload-section {
            width: 100%;
        }

        .upload-placeholder {
            width: 100%;
            aspect-ratio: 3 / 4;
            background-color: #fcfcfc;
            border: 1px dashed #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .upload-placeholder:hover {
            background-color: #f2f2f2;
        }

        .upload-placeholder span {
            font-size: 12px;
            color: var(--secondary-text);
            margin-top: 15px;
        }

        /* --- RIGHT SIDE: FORM INPUTS --- */
        .product-form {
            display: flex;
            flex-direction: column;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .input-group {
            margin-bottom: 30px;
        }

        .input-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--secondary-text);
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
        }

        input, select, textarea {
            width: 100%;
            border: none;
            border-bottom: 1px solid var(--border-color);
            padding: 12px 0;
            font-family: 'Kanit', sans-serif;
            font-size: 14px;
            outline: none;
            background: transparent;
            transition: border-color 0.3s;
        }

        textarea {
            height: 80px;
            resize: none;
        }

        input:focus, select:focus, textarea:focus {
            border-bottom: 1px solid var(--text-color);
        }

        /* --- BUTTON --- */
        .submit-btn {
            width: 100%;
            background-color: black;
            color: white;
            border: none;
            padding: 20px;
            font-family: 'Kanit', sans-serif;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.3s;
        }

        .submit-btn:hover {
            opacity: 0.8;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 850px) {
            .container {
                grid-template-columns: 1fr;
                gap: 40px;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="home.html" class="logo">HANDS2HANDS</a>
    </header>

    <div class="container">
        
        <div class="upload-section">
            <span class="section-title">ลงขายสินค้า / อัปโหลดรูปภาพ</span>
            <div class="upload-placeholder">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
                <span>คลิกเพื่ออัปโหลดรูปภาพสินค้า</span>
            </div>
        </div>

        <form class="product-form" action="showproductdetails.html">
            <span class="section-title">ข้อมูลสินค้า</span>
            
            <div class="input-group">
                <label class="input-label">ชื่อสินค้าและรายละเอียด</label>
                <textarea placeholder="เช่น เสื้อกันหนาวคณะ สีขาว สภาพ 95%..."></textarea>
            </div>

            <div class="input-group">
                <label class="input-label">หมวดหมู่สินค้า</label>
                <select>
                    <option value="">เลือกหมวดหมู่</option>
                    <option value="apparel">เสื้อผ้า</option>
                    <option value="books">หนังสือ</option>
                    <option value="gadgets">ของใช้</option>
                    <option value="others">ของสะสม</option>
                </select>
            </div>

            <div class="input-group">
                <label class="input-label">ราคาสินค้า (บาท)</label>
                <input type="number" placeholder="ระบุราคาเป็นตัวเลข">
            </div>

            <div class="input-group">
                <label class="input-label">สถานที่นัดรับสินค้า</label>
                <input type="text" placeholder="เช่น ใต้ตึก 10, หน้าโรงอาหาร">
            </div>

            <div class="input-group">
                <label class="input-label">ช่องทางการติดต่อ</label>
                <input type="text" placeholder="LINE ID หรือ เบอร์โทรศัพท์">
            </div>

            <button type="submit" class="submit-btn">ดูตัวอย่างประกาศ</button>
        </form>

    </div>

</body>
</html>
