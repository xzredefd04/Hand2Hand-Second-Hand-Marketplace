<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าแรก | HANDS2HANDS</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&family=Inter:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --border-color: #eeeeee; --secondary-text: #757575; --transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Kanit', sans-serif; background: white; }
        header { padding: 30px; text-align: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; background: white; z-index: 100; }
        .logo { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 600; letter-spacing: 6px; text-decoration: none; color: black; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        
        .category-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .category-item { font-size: 13px; color: var(--secondary-text); cursor: pointer; }
        .category-item.active { color: black; border-bottom: 1px solid black; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 30px; }
        .product-card { cursor: pointer; }
        .image-container { width: 100%; aspect-ratio: 4 / 5; border: 1px solid var(--border-color); overflow: hidden; position: relative; background: #fcfcfc; }
        .image-track { display: flex; width: 100%; height: 100%; transition: transform var(--transition); }
        .slide-img { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #fdfdfd; color: #ccc; font-size: 12px; }
        .product-info { padding: 15px 0; }
        .product-name { display: block; font-size: 14px; margin-bottom: 5px; }
        .product-price { font-size: 14px; color: var(--secondary-text); }
        
        @media (max-width: 600px) { .product-grid { grid-template-columns: 1fr 1fr; gap: 15px; } }
    </style>
</head>
<body>
    <header><a href="home.html" class="logo">HANDS2HANDS</a></header>
    <div class="container">
        <nav class="category-bar">
            <span class="category-item active">ทั้งหมด</span>
            <span class="category-item">หนังสือ</span>
            <span class="category-item">เสื้อผ้า</span>
            <span class="category-item">ของใช้</span>
            <span class="category-item">ของสะสม</span>
        </nav>
        <div class="product-grid" id="list"></div>
    </div>
    <script>
        const products = [
            { n: "หนังสือติวเข้ม", p: "250.00", c: "หนังสือ" },
            { n: "เสื้อยืดสกรีนลายคณะ", p: "350.00", c: "เสื้อผ้า" },
            { n: "โคมไฟตั้งโต๊ะมินิมอล", p: "490.00", c: "ของใช้" },
            { n: "โมเดลฟิกเกอร์สะสม", p: "2,500.00", c: "ของสะสม" },
            { n: "นิยายสืบสวนมือสอง", p: "180.00", c: "หนังสือ" },
            { n: "กางเกงยีนส์วินเทจ", p: "550.00", c: "เสื้อผ้า" },
            { n: "พัดลมพกพาสีขาว", p: "190.00", c: "ของใช้" },
            { n: "แผ่นเสียงเก่าหายาก", p: "1,200.00", c: "ของสะสม" },
            { n: "คู่มือเขียนโปรแกรม Java", p: "420.00", c: "หนังสือ" },
            { n: "เสื้อกันหนาวมีฮู้ด", p: "790.00", c: "เสื้อผ้า" },
            { n: "กระติกน้ำเก็บความเย็น", p: "320.00", c: "ของใช้" },
            { n: "เข็มกลัดที่ระลึก UTCC", p: "150.00", c: "ของสะสม" }
        ];
        const list = document.getElementById('list');
        products.forEach(p => {
            list.innerHTML += `
                <div class="product-card" onmouseenter="startSlide(this)" onmouseleave="stopSlide(this)">
                    <div class="image-container">
                        <div class="image-track"><div class="slide-img">รูป 1</div><div class="slide-img">รูป 2</div></div>
                    </div>
                    <div class="product-info"><span class="product-name">${p.n}</span><span class="product-price">฿ ${p.p}</span></div>
                </div>`;
        });
        let slideIntervals = new Map();
        function startSlide(card) {
            const track = card.querySelector('.image-track');
            let curr = 0;
            const interval = setInterval(() => { curr = (curr === 0) ? 1 : 0; track.style.transform = `translateX(-${curr * 100}%)`; }, 1200);
            slideIntervals.set(card, interval);
        }
        function stopSlide(card) { clearInterval(slideIntervals.get(card)); card.querySelector('.image-track').style.transform = 'translateX(0)'; }
    </script>
</body>
</html>
